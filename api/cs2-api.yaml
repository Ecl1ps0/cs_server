apiVersion: v1
kind: ServiceAccount
metadata:
  name: cs2-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cs2-api
rules:
  - apiGroups:
      - agones.dev
    resources:
      - gameservers
    verbs:
      - get
      - list
      - watch
      - create
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cs2-api
subjects:
  - kind: ServiceAccount
    name: cs2-api
roleRef:
  kind: Role
  name: cs2-api
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cs2-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cs2-api
  template:
    metadata:
      labels:
        app: cs2-api
    spec:
      serviceAccountName: cs2-api
      containers:
        - name: cs2-api
          image: cs2-api:v1
          imagePullPolicy: IfNotPresent
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 8080
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: cs2-api
spec:
  selector:
    app: cs2-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080